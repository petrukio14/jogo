<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sobe a Serra — Corrida</title>
<style>
  :root{
    --sky-top:#161233;
    --sky-mid:#4a2a5c;
    --sky-horizon:#ff6b35;
    --asphalt:#2c2b38;
    --asphalt-line:#39374a;
    --rail:#ffd23f;
    --p1:#00d9ff;
    --p1-dark:#0891a8;
    --p2:#ff2e63;
    --p2-dark:#b81f47;
    --cream:#f4ecd8;
    --ink:#161233;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{height:100%; margin:0; overscroll-behavior:none;}
  body{
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:linear-gradient(180deg,var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-horizon) 100%);
    color:var(--cream);
    min-height:100vh;
    display:flex; flex-direction:column;
    overflow:hidden;
    position:fixed; inset:0;
  }
  .display{
    font-family:'Arial Black', Impact, sans-serif;
    letter-spacing:0.5px;
  }
  .mono{ font-family:'Courier New', monospace; letter-spacing:4px; }

  .screen{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; position:relative; z-index:2;}
  .hidden{ display:none !important; }

  .ridge{
    position:fixed; left:0; right:0; bottom:0; height:38vh; z-index:1; pointer-events:none;
    background:
      linear-gradient(160deg, transparent 40%, rgba(22,18,51,0.55) 41%) ,
      linear-gradient(20deg, transparent 40%, rgba(22,18,51,0.4) 41%);
    background-size:60% 100%, 60% 100%;
    background-position: -10% 100%, 110% 100%;
    background-repeat:no-repeat;
    opacity:0.6;
  }

  h1.title{ font-size:clamp(28px,9vw,42px); margin:0 0 4px; color:var(--cream); text-shadow:0 2px 0 rgba(0,0,0,0.35);}
  .subtitle{ font-size:14px; opacity:0.75; margin-bottom:36px; letter-spacing:1px; text-transform:uppercase;}

  .btn{
    font-family:inherit; font-weight:700; font-size:17px;
    padding:16px 28px; border-radius:14px; border:none;
    cursor:pointer; width:100%; max-width:320px; margin:8px 0;
    transition:transform 0.08s ease;
  }
  .btn:active{ transform:scale(0.96); }
  .btn-primary{ background:var(--rail); color:var(--ink); box-shadow:0 4px 0 #b8951a;}
  .btn-primary:active{ box-shadow:0 1px 0 #b8951a; }
  .btn-outline{ background:transparent; color:var(--cream); border:2px solid rgba(244,236,216,0.4);}
  .btn-small{ width:auto; padding:10px 20px; font-size:14px; }

  input.code-input{
    font-family:'Courier New', monospace; font-size:28px; letter-spacing:10px;
    text-align:center; width:100%; max-width:220px; padding:14px 10px;
    border-radius:12px; border:2px solid rgba(244,236,216,0.4);
    background:rgba(0,0,0,0.25); color:var(--cream); margin-bottom:16px;
  }
  input.code-input:focus{ outline:none; border-color:var(--rail); }

  .code-box{
    font-family:'Courier New', monospace; font-size:52px; letter-spacing:14px;
    background:rgba(0,0,0,0.28); border:2px dashed var(--rail);
    border-radius:16px; padding:18px 10px 18px 28px; margin:18px 0 8px;
  }
  .hint{ font-size:13px; opacity:0.7; margin-top:6px; }
  .error-msg{ color:#ff8a8a; font-size:14px; margin-top:10px; min-height:18px; }

  .pulse-dot{
    width:10px; height:10px; border-radius:50%; background:var(--rail);
    display:inline-block; margin-right:8px; animation:pulse 1.1s infinite ease-in-out;
  }
  @keyframes pulse{ 0%,100%{opacity:0.3;} 50%{opacity:1;} }

  .countdown-num{ font-size:120px; font-weight:900; color:var(--rail); text-shadow:0 4px 0 rgba(0,0,0,0.3); }
  .countdown-go{ font-size:64px; color:var(--p1); }

  /* ---- Race screen ---- */
  #screen-race{ justify-content:flex-start; padding:14px 14px 0; }
  .race-header{ width:100%; display:flex; justify-content:space-between; align-items:center; font-size:13px; text-transform:uppercase; letter-spacing:1px; opacity:0.85; margin-bottom:8px;}
  .badge{ padding:4px 10px; border-radius:8px; font-weight:700; }
  .badge-p1{ background:var(--p1); color:var(--ink); }
  .badge-p2{ background:var(--p2); color:var(--ink); }

  .track-wrap{ width:100%; max-width:420px; flex:1; display:flex; gap:10px; padding-bottom:14px; min-height:0; }
  .lane{
    position:relative; flex:1; border-radius:14px; overflow:hidden;
    background:repeating-linear-gradient(180deg, var(--asphalt) 0 26px, var(--asphalt-line) 26px 30px);
    border:3px solid rgba(255,210,63,0.25);
  }
  .lane-rail-l, .lane-rail-r{
    position:absolute; top:0; bottom:0; width:5px;
    background:repeating-linear-gradient(180deg, var(--rail) 0 14px, transparent 14px 24px);
  }
  .lane-rail-l{ left:3px; } .lane-rail-r{ right:3px; }

  .finish-line{
    position:absolute; top:6%; left:0; right:0; height:14px;
    background:repeating-linear-gradient(90deg, var(--cream) 0 8px, var(--ink) 8px 16px);
  }

  .truck{
    position:absolute; left:50%; bottom:2%; width:44px; height:60px;
    transform:translate(-50%, 50%);
    transition:bottom 0.12s linear;
  }
  .truck .cab{ position:absolute; bottom:0; left:6px; width:32px; height:24px; border-radius:4px 4px 2px 2px; }
  .truck .box{ position:absolute; bottom:20px; left:0; width:44px; height:30px; border-radius:4px; }
  .truck .wheel{ position:absolute; bottom:-4px; width:12px; height:12px; border-radius:50%; background:#1a1a1a; border:2px solid #555; }
  .truck .wheel.w1{ left:2px; } .truck .wheel.w2{ left:30px; }
  .truck.mine .box{ background:var(--p1); } .truck.mine .cab{ background:var(--p1-dark); }
  .truck.theirs .box{ background:var(--p2); } .truck.theirs .cab{ background:var(--p2-dark); }

  .progress-pct{ position:absolute; top:8px; left:0; right:0; text-align:center; font-family:'Courier New',monospace; font-size:12px; opacity:0.6;}

  .tap-zone{ width:100%; padding:14px 0 22px; }
  .tap-btn{
    width:100%; max-width:420px; padding:26px; border-radius:20px; border:none;
    font-family:'Arial Black', Impact, sans-serif; font-size:26px; letter-spacing:1px;
    background:var(--rail); color:var(--ink); box-shadow:0 6px 0 #b8951a;
    cursor:pointer;
  }
  .tap-btn.pressed{ transform:translateY(4px); box-shadow:0 2px 0 #b8951a; }

  .result-title{ font-size:38px; margin-bottom:4px; }
  .result-sub{ opacity:0.8; margin-bottom:28px; }
  .winner-truck{ font-size:64px; margin-bottom:12px; }

  .row{ display:flex; gap:10px; width:100%; max-width:320px; }
  .row .btn{ flex:1; }

  .footer-note{ position:fixed; bottom:6px; left:0; right:0; text-align:center; font-size:11px; opacity:0.4; z-index:3;}
</style>
</head>
<body>
<div class="ridge"></div>

<!-- HOME -->
<div id="screen-home" class="screen">
  <h1 class="title display">SOBE A SERRA</h1>
  <div class="subtitle">corrida de caminhão · 1 contra 1</div>
  <button class="btn btn-primary" id="btn-create">Criar sala</button>
  <button class="btn btn-outline" id="btn-show-join">Entrar com código</button>

  <div id="join-form" class="hidden" style="margin-top:18px; width:100%; display:flex; flex-direction:column; align-items:center;">
    <input type="text" inputmode="numeric" maxlength="4" placeholder="0000" class="code-input" id="input-code">
    <button class="btn btn-primary" id="btn-join">Entrar na sala</button>
    <div class="error-msg" id="join-error"></div>
  </div>
</div>

<!-- WAITING (host) -->
<div id="screen-waiting" class="screen hidden">
  <div class="subtitle"><span class="pulse-dot"></span>aguardando oponente</div>
  <div class="code-box" id="waiting-code">0000</div>
  <div class="hint">compartilhe esse código com quem vai jogar</div>
  <button class="btn btn-outline btn-small" id="btn-copy-code" style="margin-top:18px;">copiar código</button>
  <button class="btn btn-outline btn-small" id="btn-cancel-wait">cancelar</button>
</div>

<!-- COUNTDOWN -->
<div id="screen-countdown" class="screen hidden">
  <div class="subtitle" id="countdown-label">preparar</div>
  <div class="countdown-num display" id="countdown-num">3</div>
</div>

<!-- RACE -->
<div id="screen-race" class="screen hidden">
  <div class="race-header">
    <span class="badge" id="my-badge">você</span>
    <span id="race-status">acelere!</span>
    <span class="badge" id="their-badge">oponente</span>
  </div>
  <div class="track-wrap">
    <div class="lane" id="lane-mine">
      <div class="lane-rail-l"></div><div class="lane-rail-r"></div>
      <div class="finish-line"></div>
      <div class="progress-pct" id="pct-mine">0%</div>
      <div class="truck mine" id="truck-mine">
        <div class="box"></div><div class="cab"></div>
        <div class="wheel w1"></div><div class="wheel w2"></div>
      </div>
    </div>
    <div class="lane" id="lane-theirs">
      <div class="lane-rail-l"></div><div class="lane-rail-r"></div>
      <div class="finish-line"></div>
      <div class="progress-pct" id="pct-theirs">0%</div>
      <div class="truck theirs" id="truck-theirs">
        <div class="box"></div><div class="cab"></div>
        <div class="wheel w1"></div><div class="wheel w2"></div>
      </div>
    </div>
  </div>
  <div class="tap-zone">
    <button class="tap-btn" id="btn-tap">ACELERA!</button>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen hidden">
  <div class="winner-truck">🏔️</div>
  <div class="result-title display" id="result-title">VOCÊ VENCEU</div>
  <div class="result-sub" id="result-sub">chegou primeiro ao topo da serra</div>
  <div class="row">
    <button class="btn btn-primary" id="btn-rematch">jogar de novo</button>
  </div>
  <button class="btn btn-outline btn-small" id="btn-home">sair da sala</button>
</div>

<div class="footer-note">toque rápido no botão pra subir a serra</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
(function(){
  const screens = ['home','waiting','countdown','race','result'];
  function show(name){
    screens.forEach(s => document.getElementById('screen-'+s).classList.toggle('hidden', s!==name));
  }

  const ROOM_PREFIX = 'serra-race-'; // namespaced so it (mostly) avoids colliding with other PeerJS apps

  let peer = null;
  let conn = null;
  let roomCode = null;
  let myRole = null; // 'p1' (host) or 'p2' (joiner)
  let myProgress = 0;
  let raceFinished = false;
  let raceStarted = false;
  let lastSend = 0;
  let countdownTimer = null;

  function vibrate(ms){ if(navigator.vibrate) navigator.vibrate(ms); }

  function send(msg){
    if(conn && conn.open) conn.send(msg);
  }

  function randomCode(){
    return String(Math.floor(1000 + Math.random()*9000));
  }

  function showConnError(msg){
    const errEl = document.getElementById('join-error');
    if(errEl) errEl.textContent = msg;
  }

  // ---------- HOME: CREATE ----------
  document.getElementById('btn-create').addEventListener('click', () => {
    roomCode = randomCode();
    myRole = 'p1';
    document.getElementById('waiting-code').textContent = roomCode;
    document.querySelector('#screen-waiting .subtitle').innerHTML = '<span class="pulse-dot"></span>aguardando oponente';
    show('waiting');

    peer = new Peer(ROOM_PREFIX + roomCode);
    peer.on('open', () => { /* ready to receive connection */ });
    peer.on('connection', (c) => {
      conn = c;
      setupConnHandlers();
      conn.on('open', () => {
        // host decides when race starts
        const startAt = Date.now() + 1800;
        send({type:'countdown', startAt});
        beginCountdown(startAt);
      });
    });
    peer.on('error', (err) => {
      if(err.type === 'unavailable-id'){
        // extremely unlikely collision, just retry with a new code
        peer.destroy();
        document.getElementById('btn-create').click();
      }
    });
  });

  // ---------- HOME: JOIN ----------
  document.getElementById('btn-show-join').addEventListener('click', () => {
    document.getElementById('join-form').classList.remove('hidden');
  });

  document.getElementById('btn-join').addEventListener('click', () => {
    const code = document.getElementById('input-code').value.trim();
    showConnError('');
    if(code.length !== 4){ showConnError('digite os 4 números do código'); return; }
    roomCode = code;
    myRole = 'p2';

    const joinBtn = document.getElementById('btn-join');
    joinBtn.textContent = 'conectando...';
    joinBtn.disabled = true;

    peer = new Peer();
    peer.on('open', () => {
      conn = peer.connect(ROOM_PREFIX + roomCode, {reliable:true});
      setupConnHandlers();
      conn.on('open', () => {
        joinBtn.textContent = 'entrar na sala';
        joinBtn.disabled = false;
        document.getElementById('waiting-code').textContent = roomCode;
        document.querySelector('#screen-waiting .subtitle').innerHTML = '<span class="pulse-dot"></span>conectado! preparando corrida';
        show('waiting');
      });
      conn.on('error', () => {
        joinBtn.textContent = 'entrar na sala';
        joinBtn.disabled = false;
        showConnError('sala não encontrada ou expirada');
      });
    });
    peer.on('error', (err) => {
      joinBtn.textContent = 'entrar na sala';
      joinBtn.disabled = false;
      if(err.type === 'peer-unavailable'){
        showConnError('sala não encontrada');
      } else {
        showConnError('erro de conexão, tente de novo');
      }
    });
  });

  document.getElementById('btn-cancel-wait').addEventListener('click', () => {
    teardown();
    show('home');
  });

  document.getElementById('btn-copy-code').addEventListener('click', () => {
    if(navigator.clipboard && roomCode){
      navigator.clipboard.writeText(roomCode).then(()=>{
        const btn = document.getElementById('btn-copy-code');
        const old = btn.textContent;
        btn.textContent = 'copiado!';
        setTimeout(()=>{ btn.textContent = old; }, 1200);
      });
    }
  });

  function teardown(){
    if(countdownTimer) clearInterval(countdownTimer);
    if(conn){ try{ conn.close(); }catch(e){} conn = null; }
    if(peer){ try{ peer.destroy(); }catch(e){} peer = null; }
    roomCode = null; myRole = null; myProgress = 0; raceFinished = false; raceStarted = false;
  }

  // ---------- DATA CHANNEL HANDLERS ----------
  function setupConnHandlers(){
    conn.on('data', (msg) => {
      if(msg.type === 'countdown'){
        beginCountdown(msg.startAt);
      } else if(msg.type === 'progress'){
        updateTruckPosition('truck-theirs', 'pct-theirs', msg.value);
      } else if(msg.type === 'finish'){
        if(!raceFinished){
          raceFinished = true;
          showResult(msg.winner);
        }
      } else if(msg.type === 'rematch'){
        beginCountdown(msg.startAt);
      }
    });
    conn.on('close', () => {
      if(document.getElementById('screen-race').classList.contains('hidden') === false ||
         document.getElementById('screen-result').classList.contains('hidden') === false){
        // opponent left mid game
      }
    });
  }

  // ---------- COUNTDOWN ----------
  function beginCountdown(startAt){
    show('countdown');
    myProgress = 0;
    raceFinished = false;
    raceStarted = false;
    const numEl = document.getElementById('countdown-num');
    const labelEl = document.getElementById('countdown-label');
    labelEl.textContent = 'preparar';
    if(countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      const msLeft = startAt - Date.now();
      const secLeft = Math.ceil(msLeft/1000);
      if(msLeft > 700){
        numEl.textContent = Math.max(secLeft,1);
        numEl.className = 'countdown-num display';
      } else if(msLeft > -700){
        numEl.textContent = 'VAI!';
        numEl.className = 'countdown-num display countdown-go';
      } else {
        clearInterval(countdownTimer);
        beginRace();
      }
    }, 100);
  }

  // ---------- RACE ----------
  function beginRace(){
    myProgress = 0;
    raceFinished = false;
    raceStarted = true;
    show('race');
    const myBadge = document.getElementById('my-badge');
    const theirBadge = document.getElementById('their-badge');
    myBadge.textContent = myRole === 'p1' ? 'você · azul' : 'você · rosa';
    myBadge.className = 'badge ' + (myRole === 'p1' ? 'badge-p1' : 'badge-p2');
    theirBadge.textContent = myRole === 'p1' ? 'oponente · rosa' : 'oponente · azul';
    theirBadge.className = 'badge ' + (myRole === 'p1' ? 'badge-p2' : 'badge-p1');

    updateTruckPosition('truck-mine', 'pct-mine', 0);
    updateTruckPosition('truck-theirs', 'pct-theirs', 0);

    const tapBtn = document.getElementById('btn-tap');
    tapBtn.onpointerdown = (e) => {
      e.preventDefault();
      if(raceFinished || !raceStarted) return;
      myProgress = Math.min(100, myProgress + 2);
      updateTruckPosition('truck-mine', 'pct-mine', myProgress);
      tapBtn.classList.add('pressed');
      setTimeout(()=>tapBtn.classList.remove('pressed'), 60);
      vibrate(8);
      const now = Date.now();
      if(now - lastSend > 120 || myProgress >= 100){
        lastSend = now;
        send({type:'progress', value: myProgress});
      }
      if(myProgress >= 100 && !raceFinished){
        raceFinished = true;
        send({type:'finish', winner: myRole});
        showResult(myRole);
      }
    };
  }

  function updateTruckPosition(truckId, pctId, pct){
    document.getElementById(truckId).style.bottom = (2 + pct*0.9) + '%';
    document.getElementById(pctId).textContent = Math.round(pct) + '%';
  }

  function showResult(winner){
    show('result');
    const iWon = winner === myRole;
    document.getElementById('result-title').textContent = iWon ? 'VOCÊ VENCEU' : 'VOCÊ PERDEU';
    document.getElementById('result-sub').textContent = iWon
      ? 'chegou primeiro ao topo da serra'
      : 'o oponente chegou primeiro dessa vez';
  }

  document.getElementById('btn-rematch').addEventListener('click', () => {
    const startAt = Date.now() + 1800;
    send({type:'rematch', startAt});
    beginCountdown(startAt);
  });

  document.getElementById('btn-home').addEventListener('click', () => {
    teardown();
    document.getElementById('join-form').classList.add('hidden');
    document.getElementById('input-code').value = '';
    showConnError('');
    show('home');
  });

  document.getElementById('input-code').addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g,'').slice(0,4);
  });

})();
</script>
</body>
</html>
